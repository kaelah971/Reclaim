[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]

[invariant]
runs = 32
depth = 32
fail_on_revert = false

[rpc_endpoints]
celo-sepolia = "https://forno.celo-sepolia.celo-testnet.org"
